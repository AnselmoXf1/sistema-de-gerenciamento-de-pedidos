<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    
    <!-- SEO -->
    <meta name="description" content="Faça o seu pedido digitalmente na Lanchonete da Fátima" />
    <meta name="keywords" content="lanchonete, pedido online, moçambique, comida" />
    
    <!-- PWA -->
    <meta name="theme-color" content="#085041" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Lanchonete" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    
    <!-- Preconnect para melhor performance -->
    <link rel="preconnect" href="http://localhost:3000" />
    <link rel="dns-prefetch" href="http://localhost:3000" />
    
    <title>Lanchonete da Fátima - Cardápio</title>
    
    <!-- Inline critical CSS para faster first paint -->
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        background: #f9fafb;
      }
      #root {
        min-height: 100vh;
      }
      .initial-loader {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        flex-direction: column;
        gap: 16px;
      }
      .initial-loader .spinner {
        width: 48px;
        height: 48px;
        border: 4px solid #e5e7eb;
        border-top-color: #085041;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Loader inicial enquanto JS carrega -->
      <div class="initial-loader">
        <div class="spinner"></div>
        <p style="color: #6b7280;">A carregar...</p>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
