services:
  # Backend API
  - type: web
    name: lanchonete-api
    env: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install && npx prisma generate
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: lanchonete-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 3000
    healthCheckPath: /health

databases:
  - name: lanchonete-db
    databaseName: lanchonete
    user: lanchonete_user
    plan: free
    region: oregon
